services:
  backend:
    build:
      context: ../sisges-sboot-app
      dockerfile: Dockerfile
    container_name: sisges-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sisges
      - SPRING_DATASOURCE_USERNAME=sisges
      - SPRING_DATASOURCE_PASSWORD=sisges123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=sisges
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - sisges-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sisges-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sisges-network

  db:
    image: postgres:15-alpine
    container_name: sisges-db
    environment:
      - POSTGRES_DB=sisges
      - POSTGRES_USER=sisges
      - POSTGRES_PASSWORD=sisges123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - sisges-network

  init:
    image: postgres:15-alpine
    container_name: sisges-init
    volumes:
      - ./init-users.sh:/init-users.sh
    command: sh /init-users.sh
    depends_on:
      - db
      - backend
    environment:
      - PGPASSWORD=sisges123
    networks:
      - sisges-network
    restart: "no"

volumes:
  postgres_data:

networks:
  sisges-network:
    driver: bridge

